<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Disfruta de las mejores películas y experiencias en Cine Club. Cartelera, estrenos, servicios y membresías.">
    <meta name="keywords" content="cine, películas, argentina, cartelera, servicios, membresías">
    <title>Cine Club</title>

    <!-- Fuentes y estilos -->
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://unpkg.com/aos@2.3.1/dist/aos.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
</head>

<body>
    <!-- Encabezado -->
    <header>
        <nav class="navbar navbar-expand-lg navbar-dark bg-dark w-100 p-3 m-0 border-0">
            <div class="container-fluid">
                <a class="navbar-brand text-white icon-link-hover" href="index.html">
                    <h1 class="h4 m-0">Cine Club</h1>
                </a>

                <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav"
                        aria-controls="navbarNav" aria-expanded="false" aria-label="Abrir menú de navegación">
                    <span class="navbar-toggler-icon"></span>
                </button>

                <div class="collapse navbar-collapse" id="navbarNav">
                    <ul class="navbar-nav ms-auto">
                        <li class="nav-item">
                            <a class="nav-link active text-white" aria-current="page" href="index.html">Inicio</a>
                        </li>
                        <li class="nav-item">
                            <a class="nav-link text-white" href="contacto.html">Contacto</a>
                        </li>
                        <li class="nav-item">
                            <a class="nav-link text-white" href="premium.html">Premium</a>
                        </li>
                        <li class="nav-item">
                            <a class="nav-link text-white" href="candy.html">Candy</a>
                        </li>
                        <li class="nav-item">
                            <a class="nav-link text-white" href="login.html">Inicia sesión</a>
                        </li>
                        <!-- CARRITO -->
                        <li class="nav-item">
                          <a class="nav-link text-white" href="#" data-bs-toggle="modal" data-bs-target="#modalCarrito">
                            🛒 <span id="contador-carrito">0</span>
                          </a>
                        </li>
                    </ul>
                </div>
            </div>
        </nav>
    </header>

    <!-- Contenido principal -->
    <main>
        <div data-aos="fade-down">
            <section class="seccion-principal text-center mb-5">
                <h2>Bienvenidos a Cine Club</h2>
                <p>Disfrutá de las mejores películas en nuestros cines</p>

                <img src="./imgProyecto/imgPrincipal.jpg" alt="Imagen principal de Cine Club" 
                     class="img-fluid rounded mx-auto d-block mb-3">

                <a href="index.html">
                    <button type="button" class="btn btn-danger">Comprar entradas</button>
                </a>
            </section>

            <!-- Cartelera -->
            <section class="mb-5">
                <h2 class="mb-4 text-center">Películas en cartelera</h2>

                <!-- BUSCADOR -->
                <input type="text" id="buscador" placeholder="Buscar película..." class="form-control mb-4">

                <!-- CONTENEDOR DINÁMICO -->
                <div id="contenedor-peliculas" class="row row-cols-1 row-cols-md-4 g-4"></div>
            </section>
        </div>
    </main>

    <!-- Footer -->
    <footer class="PieDePagina text-center py-4">
        <p>Seguinos en nuestras redes</p>
        <div class="d-flex justify-content-center gap-3 mb-3">
            <a href="https://www.facebook.com/" target="_blank">
                <img src="https://cdn-icons-png.flaticon.com/128/6422/6422199.png" alt="Facebook" width="40">
            </a>
            <a href="https://mail.google.com/mail/" target="_blank">
                <img src="https://cdn-icons-png.flaticon.com/128/3916/3916632.png" alt="Mail" width="40">
            </a>
            <a href="https://www.instagram.com/" target="_blank">
                <img src="https://cdn-icons-png.flaticon.com/128/6422/6422200.png" alt="Instagram" width="40">
            </a>
            <a href="https://www.youtube.com/" target="_blank">
                <img src="https://cdn-icons-png.flaticon.com/128/6422/6422215.png" alt="YouTube" width="40">
            </a>
        </div>
        <h6>&copy; 2025 Cine Club. Todos los derechos reservados.</h6>
    </footer>

    <!-- MODAL CARRITO -->
    <div class="modal fade" id="modalCarrito" tabindex="-1">
      <div class="modal-dialog">
        <div class="modal-content bg-dark text-white">
          <div class="modal-header">
            <h5 class="modal-title">Tu carrito</h5>
            <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal"></button>
          </div>
          <div class="modal-body" id="items-carrito"></div>
          <div class="modal-footer">
            <button class="btn btn-danger" id="vaciar-carrito">Vaciar carrito</button>
          </div>
        </div>
      </div>
    </div>

    <!-- Scripts -->
    <script src="https://unpkg.com/aos@2.3.1/dist/aos.js"></script>
    <script>
      AOS.init({ duration: 1200, once: true });
    </script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
    <script src="app.js"></script>
</body>
</html>
